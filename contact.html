                    <form action="#">
                        <div class="form-group">
                            <label for="name">Nom complet</label>
                            <input type="text" id="name" required placeholder="Ex: Jean Dupont">
                        </div>
                        <div class="form-group">
                            <label for="email">Votre Email</label>
                            <input type="email" id="email" required placeholder="exemple@mail.com">
                        </div>
                        <div class="form-group">
                            <label for="message">Votre Message</label>
                            <textarea id="message" rows="5" required placeholder="Comment puis-je vous aider ?"></textarea>
                        </div>
                        <button type="submit" class="btn" style="width: 100%;">Envoyer le message</button>
                    </form>

                    <form action="#">
                        <div class="form-group">
                            <label for="p-type">Type de projet</label>
                            <select id="p-type">
                                <option>Site Vitrine</option>
                                <option>E-commerce</option>
                                <option>Application Web</option>
                                <option>Audit / Debug</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="budget">Estimation budget</label>
                            <input type="text" id="budget" placeholder="Optionnel">
                        </div>
                        <div class="form-group">
                            <label for="p-desc">Description du besoin</label>
                            <textarea id="p-desc" rows="5" placeholder="Décrivez votre vision..."></textarea>
                        </div>
                        <button type="submit" class="btn" style="width: 100%; background-color: var(--success);">Soumettre ma demande</button>
