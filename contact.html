  <form action="#" method="POST" class="form-contact">
    
    <div class="input-group">
      <label for="prenom">Prénom *</label>
      <input type="text" id="prenom" name="prenom" required placeholder="Votre prénom">

      <label for="nom">Nom *</label>
      <input type="text" id="nom" name="nom" required placeholder="Votre nom">
    </div>

      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required placeholder="votre@email.com">
    </div>

    <div class="input-group">
      <label for="sujet">Sujet</label>
      <input type="text" id="sujet" name="sujet" placeholder="Ex : Collaboration, stage, question...">
    </div>

    <div class="input-group textarea-group">
      <label for="message">Message *</label>
      <textarea id="message" name="message" required rows="6" placeholder="Votre message ici..."></textarea>
    </div>

    <button type="submit" class="btn-envoyer">Envoyer le message <i class="fas fa-paper-plane"></i></button>
